name: Deploy to Dev (S3 + CloudFront + Route53)

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

env:
  NODE_VERSION: "20"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET: ${{ secrets.DEV_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}
  ROUTE53_HOSTED_ZONE_ID: ${{ secrets.ROUTE53_HOSTED_ZONE_ID }}
  DEV_DOMAIN: dev.mdaea-ai.click

jobs:
  build-and-deploy:
    name: Build & Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_APP_URL: https://${{ env.DEV_DOMAIN }}
          NODE_ENV: production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 bucket if not exists
        run: |
          if ! aws s3api head-bucket --bucket ${{ env.S3_BUCKET }} 2>/dev/null; then
            echo "Creating S3 bucket: ${{ env.S3_BUCKET }}"
            aws s3api create-bucket \
              --bucket ${{ env.S3_BUCKET }} \
              --region ${{ env.AWS_REGION }} \
              --create-bucket-configuration LocationConstraint=${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning \
              --bucket ${{ env.S3_BUCKET }} \
              --versioning-configuration Status=Enabled
            aws s3api put-public-access-block \
              --bucket ${{ env.S3_BUCKET }} \
              --public-access-block-configuration \
                BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          else
            echo "S3 bucket already exists: ${{ env.S3_BUCKET }}"
          fi

      - name: Sync static assets to S3 (long cache)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE

      - name: Upload index.html to S3 (no cache)
        run: |
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "CloudFront invalidation started: $INVALIDATION_ID"
          echo "Waiting for invalidation to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id $INVALIDATION_ID
          echo "Invalidation complete."

      - name: Upsert Route53 alias → CloudFront
        run: |
          CLOUDFRONT_DOMAIN=$(aws cloudfront get-distribution \
            --id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text)
          echo "CloudFront domain: $CLOUDFRONT_DOMAIN"

          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ env.ROUTE53_HOSTED_ZONE_ID }} \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"${{ env.DEV_DOMAIN }}\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                    \"DNSName\": \"$CLOUDFRONT_DOMAIN\",
                    \"EvaluateTargetHealth\": false
                  }
                }
              }]
            }"
          echo "Route53 alias updated: ${{ env.DEV_DOMAIN }} → $CLOUDFRONT_DOMAIN"

      - name: Deployment summary
        run: |
          echo "========================================="
          echo "  DEV DEPLOYMENT COMPLETE"
          echo "========================================="
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  URL     : https://${{ env.DEV_DOMAIN }}"
          echo "  S3      : s3://${{ env.S3_BUCKET }}"
          echo "  CF ID   : ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"
          echo "========================================="
