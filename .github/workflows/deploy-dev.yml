# ============================================================
# ehr-medaea-website / deploy-dev.yml
# Deploys the marketing website to dev.medaea.net
# Uses reusable workflow from Medaea-IAC/platform-workflows
# ============================================================
name: Deploy Marketing Website — Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      plan_only:
        description: "Build only — skip S3 upload and CloudFront"
        type: boolean
        default: false
      reason:
        description: "Reason for manual trigger"
        type: string
        default: "Manual deploy"

jobs:
  deploy:
    name: Deploy to dev.medaea.net
    uses: Medaea-IAC/platform-workflows/.github/workflows/static-site-deploy.yml@develop
    with:
      node_version: "20"
      build_command: "npm run build"
      dist_dir: "dist"
      s3_bucket: "medaea-dev-website"
      cloudfront_distribution_id: ${{ vars.DEV_WEBSITE_CLOUDFRONT_ID }}
      aws_region: "us-east-1"
      site_url: "dev.medaea.net"
      vite_app_url: "https://dev.medaea.net"
      vite_app_env: "dev"
      environment_name: "dev"
      plan_only: ${{ github.event.inputs.plan_only == 'true' }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
