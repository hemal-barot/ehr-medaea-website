name: Destroy Dev Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy-dev" to confirm full teardown'
        required: true
      reason:
        description: "Reason for destruction"
        required: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET: ${{ secrets.DEV_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}
  ROUTE53_HOSTED_ZONE_ID: ${{ secrets.ROUTE53_HOSTED_ZONE_ID }}
  DEV_DOMAIN: dev.mdaea-ai.click

jobs:
  destroy:
    name: Destroy Dev Environment
    runs-on: ubuntu-latest
    environment: dev
    if: github.event.inputs.confirm == 'destroy-dev'

    steps:
      - name: Validate confirmation
        run: |
          echo "Destruction confirmed by: ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Proceeding with teardown of dev environment..."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Remove Route53 alias record
        run: |
          CLOUDFRONT_DOMAIN=$(aws cloudfront get-distribution \
            --id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text 2>/dev/null || echo "")

          if [ -n "$CLOUDFRONT_DOMAIN" ]; then
            echo "Removing Route53 alias: ${{ env.DEV_DOMAIN }} → $CLOUDFRONT_DOMAIN"
            aws route53 change-resource-record-sets \
              --hosted-zone-id ${{ env.ROUTE53_HOSTED_ZONE_ID }} \
              --change-batch "{
                \"Changes\": [{
                  \"Action\": \"DELETE\",
                  \"ResourceRecordSet\": {
                    \"Name\": \"${{ env.DEV_DOMAIN }}\",
                    \"Type\": \"A\",
                    \"AliasTarget\": {
                      \"HostedZoneId\": \"Z2FDTNDATAQYW2\",
                      \"DNSName\": \"$CLOUDFRONT_DOMAIN\",
                      \"EvaluateTargetHealth\": false
                    }
                  }
                }]
              }" || echo "Route53 record may not exist, skipping."
          else
            echo "CloudFront distribution not found, skipping Route53 cleanup."
          fi

      - name: Disable CloudFront distribution
        run: |
          ETAG=$(aws cloudfront get-distribution-config \
            --id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --query 'ETag' --output text 2>/dev/null || echo "")

          if [ -n "$ETAG" ]; then
            echo "Disabling CloudFront distribution: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"
            DIST_CONFIG=$(aws cloudfront get-distribution-config \
              --id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
              --query 'DistributionConfig' --output json)

            DISABLED_CONFIG=$(echo "$DIST_CONFIG" | node -e "
              const d=[];process.stdin.on('data',c=>d.push(c));
              process.stdin.on('end',()=>{
                const cfg=JSON.parse(d.join(''));
                cfg.Enabled=false;
                console.log(JSON.stringify(cfg));
              })")

            aws cloudfront update-distribution \
              --id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
              --if-match $ETAG \
              --distribution-config "$DISABLED_CONFIG"
            echo "CloudFront distribution disabled. It can be re-enabled via the deploy pipeline."
          else
            echo "CloudFront distribution not found, skipping."
          fi

      - name: Empty S3 bucket
        run: |
          if aws s3api head-bucket --bucket ${{ env.S3_BUCKET }} 2>/dev/null; then
            echo "Emptying S3 bucket: ${{ env.S3_BUCKET }}"
            aws s3 rm s3://${{ env.S3_BUCKET }} --recursive
            echo "All objects deleted from S3 bucket."
          else
            echo "S3 bucket not found, skipping."
          fi

      - name: Destruction summary
        run: |
          echo "========================================="
          echo "  DEV INFRASTRUCTURE DESTROYED"
          echo "========================================="
          echo "  Actor   : ${{ github.actor }}"
          echo "  Reason  : ${{ github.event.inputs.reason }}"
          echo "  Domain  : ${{ env.DEV_DOMAIN }} (DNS removed)"
          echo "  S3      : s3://${{ env.S3_BUCKET }} (emptied)"
          echo "  CF      : ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} (disabled)"
          echo ""
          echo "  To redeploy: push to develop branch or"
          echo "  trigger the 'Deploy to Dev' workflow manually."
          echo "========================================="
