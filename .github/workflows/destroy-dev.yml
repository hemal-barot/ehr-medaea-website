# ============================================================
# ehr-medaea-website / destroy-dev.yml
# Empties S3 bucket and invalidates CloudFront for dev.medaea.net
# Uses reusable workflow from Medaea-IAC/platform-workflows
# ============================================================
name: Destroy Marketing Website — Dev

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'destroy' to confirm"
        type: string
        required: true
      reason:
        description: "Reason for destruction"
        type: string
        required: true

jobs:
  destroy:
    name: Destroy dev.medaea.net
    uses: Medaea-IAC/platform-workflows/.github/workflows/static-site-destroy.yml@develop
    with:
      s3_bucket: "medaea-dev-website"
      cloudfront_distribution_id: ${{ vars.DEV_WEBSITE_CLOUDFRONT_ID }}
      aws_region: "us-east-1"
      environment_name: "dev"
      confirm: ${{ github.event.inputs.confirm }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
